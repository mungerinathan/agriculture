<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Agro Market</title>
</head>

<body style="
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    flex-direction:column;
    min-height:100vh;
">

<!-- HEADER -->
<header style="
    background:#1b5e20;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
">

    <h1 style="margin:0; font-size:20px;">
        RW-Rulindo Agro Market
    </h1>

    <!-- MENU -->
    <nav style="display:flex; align-items:center; gap:18px;">

        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">Home</a>
        <a href="login.html" style="color:white; text-decoration:none; font-weight:bold;">Login</a>
        <a href="productshop.html" style="color:white; text-decoration:none; font-weight:bold;">shop</a>
        <a href="service.html" style="color:white; text-decoration:none; font-weight:bold;">Services</a>
        <a href="checkautform.html" style="color:white; text-decoration:none; font-weight:bold;">Checkout</a>

        <!-- ICONS -->
        <span style="cursor:pointer;">🔍</span>
        <span style="cursor:pointer;">🛒</span>
        <span style="cursor:pointer;">👤</span>

    </nav>

</header>

<!-- MAIN CONTENT -->
<main style="
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
">

    <div style="
        width:350px;
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    ">

        <!-- BACK BUTTON FIXED -->
        <button onclick="history.back()" style="
            width:100%;
            padding:10px;
            margin-bottom:10px;
            background:gray;
            color:white;
            border:none;
            cursor:pointer;
            border-radius:5px;
        ">
            ⬅ Back
        </button>

        <h2 style="text-align:center; color:#1b5e20;">
            Sign up
        </h2>

        <input type="text" id="regUser" placeholder="Username" style="
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        ">

        <input type="password" id="regPass" placeholder="Password" style="
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        ">

        <button onclick="register()" style="
            width:100%;
            padding:10px;
            background:#1b5e20;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        ">
            Register
        </button>

        <p style="text-align:center;">
            <a href="forgot.html">Forgot Password?</a>
        </p>

        <p style="text-align:center;">
        Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</main>

<!-- FOOTER -->
<footer style="
    background:#1b5e20;
    color:white;
    padding:20px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
">

    <div>
        <h3 style="margin:0;">RW-Rulindo Agro Market</h3>
        <p style="margin:5px 0; font-size:13px;">
            Trusted agricultural marketplace
        </p>
    </div>

    <div style="display:flex; gap:15px; flex-wrap:wrap;">
        <p style="margin:0;">Email: info@agromarket.rw</p>
        <p style="margin:0;">Tel: +250 735 907 160</p>
        <p style="margin:0;">© 2026 All Rights Reserved</p>
    </div>

</footer>

<!-- SCRIPT -->
<script>
function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if(user === "" || pass === "") {
        alert("Please fill all fields!");
    } else {
        localStorage.setItem("user", user);
        alert("Registration successful!");
        window.location.href = "login.html";
    }
}
</script>

</body>
</html>
