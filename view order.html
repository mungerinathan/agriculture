<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farmer Orders - RW Agro Market</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f1f8e9;
}

/* HEADER */
header{
    background:#1b5e20;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo-section{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-section img{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    padding:5px;
}

.logo-section h1{
    color:white;
    margin:0;
    font-size:26px;
}

/* NAV */
nav{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border-radius:6px;
}

nav a:hover{
    background:white;
    color:#1b5e20;
}

/* PAGE */
.page-title{
    text-align:center;
    padding:30px 10px 10px;
}

.page-title h2{
    color:#1b5e20;
    font-size:35px;
}

/* GRID */
.container{
    width:95%;
    margin:auto;
}

.orders{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

/* CARD */
.order-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    border-top:6px solid #2e7d32;
}

.order-card h2{
    color:#1b5e20;
}

.info{
    line-height:1.8;
}

/* IMAGE FIX */
.product-image{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    margin-top:10px;
}

/* BUTTONS */
button{
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-right:10px;
}

.accept-btn{background:#2e7d32;color:white;}
.reject-btn{background:#c62828;color:white;}
.delete-btn{background:black;color:white;}

</style>
</head>

<body>

<header>

<div class="logo-section">
    <!-- FIXED IMAGE NAME -->
    <img src="agricultural-logo.png"
         onerror="this.src='https://via.placeholder.com/80'">

    <h1>RW-Rulindo Agro Market</h1>
</div>

<nav>
    <a href="index.html">Home</a>
    <a href="login2.html">Login</a>
    <a href="sign up.html">Sign Up</a>
    <a href="productshop.html">Shop</a>
    <a href="service.html">Services</a>
    <a href="checkautform.html">Orders</a>
    <a href="contact.html">Contact</a>
</nav>

</header>

<div class="page-title">
    <h2>Farmer Orders</h2>
</div>

<div class="container">
<div class="orders" id="ordersContainer"></div>
</div>

<script>

/* SAMPLE DATA */
if(localStorage.getItem("orders") === null){

    let sampleOrders = [{
        customerName:"Nathan",
        product:"Tomatoes",
        productImage:"https://images.unsplash.com/photo-1546094096-0df4bcaaa337",
        quantity:50,
        address:"Kigali",
        phone:"+250788111111",
        date:"15 May 2026",
        payment:"Mobile Money",
        status:"Pending"
    }];

    localStorage.setItem("orders", JSON.stringify(sampleOrders));
}

let orders = JSON.parse(localStorage.getItem("orders")) || [];
let container = document.getElementById("ordersContainer");

function displayOrders(){

    container.innerHTML = "";

    if(orders.length === 0){
        container.innerHTML = "<h3>No Orders Found</h3>";
        return;
    }

    orders.forEach((data, index) => {

        let img = data.productImage 
        ? data.productImage 
        : "https://via.placeholder.com/300";

        container.innerHTML += `
        <div class="order-card">

            <h2>${data.customerName}</h2>

            <div class="info">
                <p>${data.product}</p>
                <p>${data.quantity} KG</p>
                <p>${data.address}</p>
                <p>${data.phone}</p>
                <p>${data.date}</p>
                <p>${data.payment}</p>
                <p>Status: ${data.status}</p>

                <img src="${img}"
                     class="product-image"
                     onerror="this.src='https://via.placeholder.com/300'">
            </div>

            <button class="accept-btn" onclick="acceptOrder(${index})">Accept</button>
            <button class="reject-btn" onclick="rejectOrder(${index})">Reject</button>
            <button class="delete-btn" onclick="deleteOrder(${index})">Delete</button>

        </div>
        `;
    });
}

function acceptOrder(i){
    orders[i].status="Accepted";
    localStorage.setItem("orders",JSON.stringify(orders));
    displayOrders();
}

function rejectOrder(i){
    orders[i].status="Rejected";
    localStorage.setItem("orders",JSON.stringify(orders));
    displayOrders();
}

function deleteOrder(i){
    orders.splice(i,1);
    localStorage.setItem("orders",JSON.stringify(orders));
    displayOrders();
}

displayOrders();

</script>

</body>
</html>
