<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RW-Rulindo Agro Market</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

/* HEADER */
header{
    background:#1b5e20;
    color:white;
    padding:15px;
    position:sticky;
    top:0;
    z-index:1000;
}

.header-container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo img{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
}

.logo h1{
    margin:0;
    font-size:20px;
}

.logo p{
    margin:0;
    font-size:13px;
    opacity:0.9;
}

nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
    padding:6px 10px;
    border-radius:5px;
}

nav a:hover{
    background:rgba(255,255,255,0.2);
}

/* FORM */
.container{
    width:90%;
    max-width:400px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.container h2{
    text-align:center;
    color:#1b5e20;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    color:#1b5e20;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:darkgreen;
}

/* FOOTER */
footer{
    background:#1b5e20;
    color:white;
    padding:30px 15px;
    margin-top:40px;
}

.footer-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:20px;
    max-width:1000px;
    margin:auto;
}

.footer-grid a{
    color:white;
    text-decoration:none;
    display:block;
    margin:5px 0;
}

.footer-grid a:hover{
    text-decoration:underline;
}

.social{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.social a{
    width:35px;
    height:35px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    color:white;
    text-decoration:none;
}

.social a:hover{
    background:white;
    color:#1b5e20;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>

<div class="header-container">

    <div class="logo">
      <a href="index.html">  <img src="agricultural logo.png"></a>

        <div>
            <h1>RW-Rulindo Agro Market</h1>
            <p>Market for crops & agricultural products</p>
        </div>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="login2.html">Login</a>
        <a href="sign up.html">Sign Up</a>
        <a href="productshop.html">Shop</a>
        <a href="service.html">Services</a>
        <a href="checkautform.html">Orders</a>
        <a href="contact.html">Contact</a>
    </nav>

</div>

</header>

<!-- REGISTER FORM -->
<div class="container">

    <h2>Create Account</h2>

    <label>User Name</label>
    <input type="text" id="regUser" placeholder="Enter new username">

    <label>Password</label>
    <input type="password" id="regPass" placeholder="Enter new password">

    <button onclick="register()">
        Register
    </button>

</div>

<!-- JAVASCRIPT -->
<script>

function register(){

    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if(user === "" || pass === ""){
        alert("Fill all fields");
        return;
    }

    // SAVE ACCOUNT
    localStorage.setItem("user", user);
    localStorage.setItem("pass", pass);

    alert("Registration successful!");

    // REDIRECT TO LOGIN PAGE
    window.location.href = "login2.html";
}

</script>

<!-- FOOTER -->
<footer>

<div class="footer-grid">

    <div>
        <h3>RW-Rulindo Agro Market</h3>
        <p>We connect farmers and buyers across Rwanda.</p>
    </div>

    <div>
        <h3>Quick Links</h3>

        <a href="index.html">Home</a>
        <a href="login2.html">Login</a>
        <a href="productshop.html">Shop</a>
        <a href="service.html">Services</a>
        <a href="checkautform.html">Orders</a>
        <a href="contact.html">Contact</a>
    </div>

    <div>
        <h3>Follow Us</h3>

        <div class="social">

            <a href="https://facebook.com">
                <i class="fa-brands fa-facebook-f"></i>
            </a>

            <a href="https://instagram.com">
                <i class="fa-brands fa-instagram"></i>
            </a>

            <a href="https://twitter.com">
                <i class="fa-brands fa-twitter"></i>
            </a>

            <a href="https://wa.me/250788123456">
                <i class="fa-brands fa-whatsapp"></i>
            </a>

        </div>

    </div>

</div>

<div style="text-align:center; margin-top:20px; font-size:14px; opacity:0.8;">
    © 2026 RW-Rulindo Agro Market
</div>

</footer>

</body>
</html>
