<style>
body{
    font-family: Arial;
    background:#eaf7ea;
    margin:0;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* HEADER */
header{
    background:#1b5e20;
    color:white;
    padding:40px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

/* NAV */
nav{
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
}

/* MAIN CENTER */
.main{
    display:flex;
    justify-content:center;
    align-items:center;
    flex:1;
    padding:20px;
}

/* BOXES */
.box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:100%;
    max-width:320px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* INPUTS */
input, select, button{
    width:100%;
    padding:10px;
    margin:6px 0;
    box-sizing:border-box;
}

/* BUTTON */
button{
    background:#1b5e20;
    color:white;
    border:none;
    cursor:pointer;
}

/* FOOTER */
footer{
    background:#1b5e20;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

/* 📱 RESPONSIVE */
@media(max-width:768px){

    header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    nav{
        width:100%;
        justify-content:center;
    }

    footer{
        flex-direction:column;
        text-align:center;
        gap:10px;
    }
}
</style>

</head>

<script>
// LOGIN
function login() {
  let name = document.getElementById("username").value;

  if(name === "") {
    alert("Please enter your name");
  } else {
    localStorage.setItem("user", name);
    showOrder();
  }
}

// SHOW ORDER
function showOrder() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("orderBox").style.display = "block";
}

// LOGOUT
function logout() {
  localStorage.removeItem("user");
  location.reload();
}

// SUBMIT ORDER
function submitOrder() {
  alert("Order submitted successfully!");
}

// AUTO LOGIN
if(localStorage.getItem("user")){
  showOrder();
}
</script>
