<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =========================
   GLOBAL STYLES
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eaf7ea;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* =========================
   HEADER
========================= */

header{
    background:#1b5e20;
    color:white;
    padding:18px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

header h1{
    font-size:22px;
}

nav{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    padding:8px 12px;
    border-radius:5px;
    transition:0.3s;
}

nav a:hover{
    background:white;
    color:#1b5e20;
}

/* =========================
   MAIN AREA
========================= */

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* =========================
   FORM BOX
========================= */

.box{
    background:white;
    width:100%;
    max-width:380px;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* =========================
   INPUTS
========================= */

input,
select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
    transition:0.3s;
}

input:focus,
select:focus{
    border-color:#1b5e20;
    box-shadow:0 0 5px rgba(27,94,32,0.3);
}

/* =========================
   BUTTON
========================= */

button{
    width:100%;
    padding:12px;
    background:#1b5e20;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

button:hover{
    background:#2e7d32;
}

/* =========================
   IMAGE PREVIEW FIX
========================= */

#previewImage{
    width:250px;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #1b5e20;
}

/* wrapper optional */
.image-wrapper{
    width:250px;
    height:200px;
    overflow:hidden;
    margin:auto;
}

/* =========================
   FOOTER
========================= */

footer{
    background:#1b5e20;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:auto;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

    header{
        flex-direction:column;
        text-align:center;
        gap:10px;
    }

    nav{
        justify-content:center;
    }

    .box{
        width:95%;
    }
}

/* FOOTER GRID */
.footer-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    background:#1b5e20;
    color:white;
    padding:30px 20px;
}

/* FOOTER BOX */
.footer-box h3{
    margin-bottom:10px;
}

.footer-box p{
    font-size:14px;
    line-height:1.6;
}

/* LINKS */
.footer-box a{
    display:block;
    color:white;
    text-decoration:none;
    margin:6px 0;
    font-size:14px;
    transition:0.3s;
}

.footer-box a:hover{
    color:#c8e6c9;
    transform:translateX(5px);
}

/* SOCIAL */
.social{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.social a{
    width:40px;
    height:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.social a:hover{
    transform:scale(1.1);
}

.facebook{background:#1877F2;}
.instagram{background:#E1306C;}
.twitter{background:#1DA1F2;}
.whatsapp{background:#25D366;}

/* COPYRIGHT */
footer .copyright{
    text-align:center;
    padding:15px;
    background:#145a18;
    color:white;
    font-size:14px;
}


</style>
</head>

<body>

<header>

<div style="display:flex; align-items:center; gap:10px;">
<img src="agricultural logo.png"
style="width:50px;height:50px;border-radius:50%;">

<h1 style="margin:0;">RW-Rulindo Agro Market</h1>
</div>

<nav>
<a href="index.html">Home</a>
<a href="login2.html">Login</a>

<a href="productshop.html">Shop</a>
<a href="service.html">Services</a>
<a href="view order.html">Orders</a>
<a href="contact.html">Contact</a>
<a href="about.html">about</a>
</nav>

</header>

<div class="main">

<!-- LOGIN BOX -->
<div id="loginBox" class="box">

<h2 style="text-align:center;color:#1b5e20;">Login</h2>

<input id="username" type="text" placeholder="Enter Name">

<button onclick="login()">Login</button>

</div>

<!-- ORDER BOX -->
<div id="orderBox" class="box" style="display:none;">

<h2 style="text-align:center;color:#1b5e20;">Order Form</h2>

<input id="customerName" type="text" placeholder="Customer Name">

<input 
type="tel"
id="phone"
placeholder="Phone Number"
maxlength="10"

oninput="
this.value=this.value.replace(/[^0-9]/g,'');
if(this.value.length > 10){
this.value=this.value.substring(0,10);
}
"
required>

<input id="address" type="text" placeholder="Delivery Address">

<input id="quantity" type="number" placeholder="Quantity / KG" min="1">

<select id="productImage" onchange="showImage()">

<option value="">Select Product Image</option>

<option value="100.jfif">Apple</option>
<option value="3.jfif">Banana</option>
<option value="14.jfif">Potatoes</option>
<option value="6.jfif">Avocado</option>
<option value="7.jfif">Onion</option>
<option value="8.jfif">Carrots</option>
<option value="9.jfif">Vegetables</option>
<option value="10.jfif">Pineapple</option>
<option value="13.jfif">Mushroom</option>
<option value="5.jfif">Beans</option>
<option value="20.jfif">Eggs</option>
<option value="18.jfif">Meat</option>
<option value="4.jfif">Maize</option>
<option value="17.jfif">Milk</option>
<option value="16.jfif">Cassava Leaves</option>

</select>

<div style="text-align:center;margin-top:10px;">
<img id="previewImage"
style="width:100%;max-width:250px;height:200px;
object-fit:cover;border-radius:10px;
border:2px solid #2e7d32;display:none;">
</div>

<input id="date" type="date">

<select id="payment">
<option>Select Payment Method</option>
<option>Cash</option>
<option>Mobile Money</option>
<option>Card</option>
</select>

<button onclick="submitOrder()">Submit Order</button><br><br><br>

<button onclick="logout()"
style="background:#c62828;">Logout</button>

</div>

</div>
<div style="text-align:center; margin:20px 0;">
    <a href="view order.html"
       style="
        display:inline-block;
        background:linear-gradient(to right, #0b6623, #1faa4a);
        color:white;
        padding:12px 25px;
        border-radius:8px;
        text-decoration:none;
        font-weight:bold;
        font-size:16px;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        transition:0.3s;
       "
       onmouseover="this.style.transform='scale(1.05)'"
       onmouseout="this.style.transform='scale(1)'">
        📦 View Orders
    </a>
</div>

<div class="footer-grid">

    <!-- ABOUT -->
    <div class="footer-box">
        <h3>RW-Rulindo Agro Market</h3>
        <p>
            We connect farmers and buyers across Rwanda.
            Fast, reliable and trusted agricultural marketplace.
        </p>
    </div>

    <!-- LINKS -->
    <div class="footer-box">
        <h3>Quick Links</h3>

        <a href="index.html">Home</a>
        <a href="login2.html">Login</a>
   
        <a href="productshop.html">Shop</a>
        <a href="service.html">Services</a>
        <a href="view order.html">Orders</a>
        <a href="contact.html">Contact</a>
    </div>

    <!-- SOCIAL -->
    <div class="footer-box">
        <h3>Follow Us</h3>

        <div class="social">

            <a href="https://facebook.com" class="facebook" target="_blank">
                <i class="fa-brands fa-facebook-f"></i>
            </a>

            <a href="https://instagram.com" class="instagram" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>

            <a href="https://twitter.com" class="twitter" target="_blank">
                <i class="fa-brands fa-twitter"></i>
            </a>

            <a href="https://wa.me/250788123456" class="whatsapp" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>
            </a>

        </div>
    </div>

</div>




</footer>
<script>

/* LOGIN */
function login(){

let name = document.getElementById("username").value;

if(name === ""){
alert("Enter name");
return;
}

localStorage.setItem("user", name);

showOrder();

}

/* SHOW ORDER FORM */
function showOrder(){
document.getElementById("loginBox").style.display="none";
document.getElementById("orderBox").style.display="block";
}

/* LOGOUT */
function logout(){
localStorage.removeItem("user");
location.reload();
}

/* SHOW IMAGE */
function showImage(){

let img = document.getElementById("previewImage");
let val = document.getElementById("productImage").value;

if(val === ""){
img.style.display="none";
}else{
img.src = val;
img.style.display="block";
}

}

/* SUBMIT ORDER */
function submitOrder(){

let customerName = document.getElementById("customerName").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let quantity = document.getElementById("quantity").value;
let productImage = document.getElementById("productImage").value;
let date = document.getElementById("date").value;
let payment = document.getElementById("payment").value;

if(
customerName===""||
phone===""||
address===""||
quantity===""||
productImage===""||
date===""||
payment==="Select Payment Method"
){
alert("Fill all fields");
return;
}

let product =
document.getElementById("productImage")
.options[
document.getElementById("productImage").selectedIndex
].text;

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

let newOrder = {
customerName,
phone,
address,
quantity,
product,
productImage,
date,
payment,
status:"Pending"
};

orders.push(newOrder);

localStorage.setItem("orders", JSON.stringify(orders));

alert("Order submitted!");

window.location.href = "view order.html";

}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
showOrder();
}

</script>

</body>
</html>
