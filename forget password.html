<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    font-family: Arial;
    background:#eef2f7;
    margin:0;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* HEADER */
header{
    background:#1b5e20;
    color:white;
    padding:15px;
}

.header-container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:50px;
    height:50px;
    border-radius:50%;
    background:white;
    padding:5px;
}

nav a{
    color:white;
    margin:0 8px;
    text-decoration:none;
    font-weight:bold;
}

/* MAIN */
main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.box{
    background:white;
    padding:25px;
    border-radius:10px;
    width:300px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#0073e6;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    background:#005bb5;
}

.msg{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

/* FOOTER */
footer{
    background:#1b5e20;
    color:white;
    padding:2px;
}

.footer-container{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
}

/* SOCIAL ICONS ONLY */
.social a{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    width:40px;
    height:40px;
    margin-right:10px;
    background:white;
    color:#1b5e20;
    border-radius:50%;
    font-size:18px;
    text-decoration:none;
    transition:0.3s;
}

.social a:hover{
    background:#1b5e20;
    color:white;
}

.footer-links a{
    display:block;
    color:white;
    text-decoration:none;
    margin:5px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="header-container">

    <div class="logo">
        <img src="agricultural logo.png" alt="logo">
        <div>
            <h3 style="margin:0;">RW-Rulindo Agro Market</h3>
            <p style="margin:0; font-size:12px;">Agricultural marketplace</p>
        </div>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="login2.html">Login</a>
        <a href="sign up.html">Sign Up</a>
        <a href="productshop.html">Shop</a>
        <a href="service.html">Services</a>
        <a href="checkautform.html">Orders</a>
        <a href="contact.html">Contact</a>
    </nav>

</div>
</header>

<!-- MAIN -->
<main>

<div class="box">

    <h2>Forgot Password</h2>

    <input type="email" id="email" placeholder="Enter your email">

    <button onclick="resetPassword()">
        Send Reset Link
    </button>

    <div class="msg" id="msg"></div>

    <a href="login2.html">
        <button style="background:gray;">
            ⬅ Back to Login
        </button>
    </a>

</div>

</main>

<!-- FOOTER -->
<footer>

<div class="footer-container">

    <div>
        <h3>RW-Rulindo Agro Market</h3>
        <p>We connect farmers and buyers across Rwanda.</p>
    </div>

    <div class="footer-links">
        <h3>Quick Links</h3>
        <a href="index.html">Home</a>
        <a href="login2.html">Login</a>
        <a href="productshop.html">Shop</a>
        <a href="service.html">Services</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="social">
        <h3>Follow Us</h3>

        <a href="https://facebook.com" target="_blank" title="Facebook">
            <i class="fa-brands fa-facebook-f"></i>
        </a>

        <a href="https://instagram.com" target="_blank" title="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="https://twitter.com" target="_blank" title="Twitter">
            <i class="fa-brands fa-twitter"></i>
        </a>

        <a href="https://wa.me/250735907160" target="_blank" title="WhatsApp">
            <i class="fa-brands fa-whatsapp"></i>
        </a>

    </div>

</div>

</footer>

<!-- SCRIPT -->
<script>
if(!localStorage.getItem("users")){
    localStorage.setItem("users", JSON.stringify([
        {email:"test@gmail.com", password:"12345"}
    ]));
}

function resetPassword(){
    let email = document.getElementById("email").value;
    let msg = document.getElementById("msg");

    if(email === ""){
        msg.style.color="red";
        msg.innerText="Email is required!";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users"));
    let user = users.find(u => u.email === email);

    if(user){
        msg.style.color="green";
        msg.innerText="Reset link sent to " + email;
    }else{
        msg.style.color="red";
        msg.innerText="Email not found!";
    }
}
</script>

</body>
</html>
