<!DOCTYPE html>
<html>
<head>
<title>User Contact</title>
<style>
body{font-family:Arial;background:#f4f4f4;}
.box{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
    <h2>Contact Us</h2>

    <input id="name" placeholder="Your name">
    <textarea id="msg" placeholder="Write your issue"></textarea>

    <button onclick="send()">Send</button>
</div>

<script>
function send(){
    let name = document.getElementById("name").value;
    let msg = document.getElementById("msg").value;

    let data = JSON.parse(localStorage.getItem("messages")) || [];

    data.push({name:name, message:msg});

    localStorage.setItem("messages", JSON.stringify(data));

    alert("Message sent!");
}
</script>

</body>
</html>
