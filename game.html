<div class="game-container">

<h2>🐍 Agro Business Snake Game 🌾💰</h2>

<canvas id="game" width="400" height="400"></canvas>

<button onclick="restartGame()">🔄 start game</button>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 20;
let score, money, snake, direction, food, game;

const products = ["🌽","🥕","🍅","🥔"];

function init(){
    score = 0;
    money = 0;
    snake = [{x:9*box, y:9*box}];
    direction = "RIGHT";
    food = randomFood();

    if(game) clearInterval(game);
    game = setInterval(drawGame, 200); // 🐌 slow speed
}

document.addEventListener("keydown", changeDir);

function changeDir(e){
    if(e.keyCode == 37 && direction != "RIGHT") direction = "LEFT";
    if(e.keyCode == 38 && direction != "DOWN") direction = "UP";
    if(e.keyCode == 39 && direction != "LEFT") direction = "RIGHT";
    if(e.keyCode == 40 && direction != "UP") direction = "DOWN";
}

function randomFood(){
    return {
        x: Math.floor(Math.random()*19)*box,
        y: Math.floor(Math.random()*19)*box,
        icon: products[Math.floor(Math.random()*products.length)]
    };
}

function drawGame(){

    ctx.fillStyle = "#c8e6c9";
    ctx.fillRect(0,0,400,400);

    ctx.font = "20px Arial";
    ctx.fillText(food.icon, food.x, food.y + 18);

    for(let i=0;i<snake.length;i++){
        ctx.fillStyle = i==0 ? "#2e7d32" : "#66bb6a";
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
    }

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(direction == "LEFT") headX -= box;
    if(direction == "RIGHT") headX += box;
    if(direction == "UP") headY -= box;
    if(direction == "DOWN") headY += box;

    if(headX == food.x && headY == food.y){
        score++;
        money += 100;
        food = randomFood();
    } else {
        snake.pop();
    }

    let newHead = {x:headX, y:headY};

    if(headX < 0 || headY < 0 || headX >= 400 || headY >= 400 || collision(newHead, snake)){
        clearInterval(game);
        alert("Game Over 🌾\nScore: " + score + "\nProfit: " + money + " RWF 💰");
    }

    snake.unshift(newHead);

    ctx.fillStyle = "#1b5e20";
    ctx.fillText("Score: " + score, 10, 390);
    ctx.fillText("💰 " + money + " RWF", 220, 390);
}

function collision(head, array){
    for(let i=0;i<array.length;i++){
        if(head.x == array[i].x && head.y == array[i].y){
            return true;
        }
    }
    return false;
}

function restartGame(){
    init();
}

init();
</script>
